- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘Manrope’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
overflow-x: hidden;
}

/* HEADER */
header {
padding: 28px 32px 20px;
border-bottom: 1px solid var(–border);
display: flex;
align-items: flex-start;
justify-content: space-between;
gap: 24px;
flex-wrap: wrap;
}

.header-left h1 {
font-size: 20px;
font-weight: 700;
letter-spacing: -0.3px;
color: var(–text);
}
.header-left p {
font-size: 12px;
color: var(–text-muted);
margin-top: 4px;
font-weight: 400;
}

.filters {
display: flex;
gap: 8px;
flex-wrap: wrap;
align-items: center;
}

.filter-label {
font-size: 11px;
color: var(–text-muted);
font-weight: 600;
letter-spacing: 0.5px;
text-transform: uppercase;
margin-right: 4px;
}

.filter-btn {
padding: 5px 12px;
border-radius: 20px;
border: 1px solid var(–border2);
background: var(–surface);
color: var(–text-muted);
font-size: 11px;
font-weight: 600;
font-family: ‘Manrope’, sans-serif;
cursor: pointer;
transition: all 0.15s;
letter-spacing: 0.3px;
}
.filter-btn:hover { border-color: var(–blue); color: var(–blue); }
.filter-btn.active { background: var(–blue-dim); border-color: var(–blue); color: var(–blue); }

/* LEGEND */
.legend {
display: flex;
gap: 16px;
padding: 12px 32px;
border-bottom: 1px solid var(–border);
flex-wrap: wrap;
align-items: center;
}
.legend-label {
font-size: 11px;
color: var(–text-muted);
font-weight: 600;
letter-spacing: 0.5px;
text-transform: uppercase;
margin-right: 4px;
}
.legend-item {
display: flex;
align-items: center;
gap: 6px;
font-size: 11px;
color: var(–text-muted);
}
.legend-dot {
width: 8px; height: 8px;
border-radius: 50%;
flex-shrink: 0;
}

/* MAIN */
main {
padding: 24px 32px 60px;
max-width: 1400px;
}

/* DOMAINS GRID */
.domains {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
gap: 16px;
}

/* DOMAIN CARD */
.domain {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
overflow: hidden;
transition: border-color 0.2s;
}

.domain-header {
padding: 16px 20px 14px;
display: flex;
align-items: center;
gap: 12px;
border-bottom: 1px solid var(–border);
cursor: pointer;
user-select: none;
}
.domain-header:hover { background: rgba(255,255,255,0.02); }

.domain-icon {
width: 32px; height: 32px;
border-radius: 8px;
display: flex; align-items: center; justify-content: center;
font-size: 15px;
flex-shrink: 0;
}

.domain-title { flex: 1; }
.domain-title h2 {
font-size: 14px;
font-weight: 700;
letter-spacing: -0.2px;
}
.domain-title p {
font-size: 11px;
color: var(–text-muted);
margin-top: 2px;
}

.domain-toggle {
color: var(–text-dim);
font-size: 18px;
transition: transform 0.2s;
line-height: 1;
}
.domain.collapsed .domain-toggle { transform: rotate(-90deg); }

.domain-body { padding: 12px 16px 16px; }
.domain.collapsed .domain-body { display: none; }

/* CATEGORY */
.category {
margin-bottom: 12px;
}
.category:last-child { margin-bottom: 0; }

.category-name {
font-size: 10px;
font-weight: 700;
letter-spacing: 0.8px;
text-transform: uppercase;
color: var(–text-dim);
padding: 4px 6px;
margin-bottom: 6px;
}

/* METRIC ROW */
.metric {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
margin-bottom: 6px;
overflow: hidden;
cursor: pointer;
transition: border-color 0.15s;
}
.metric:hover { border-color: var(–border2); }
.metric.expanded { border-color: var(–border2); }
.metric.hidden-by-filter { display: none; }

.metric-row {
padding: 9px 12px;
display: flex;
align-items: center;
gap: 10px;
}

.metric-status {
width: 7px; height: 7px;
border-radius: 50%;
flex-shrink: 0;
}
.status-green { background: var(–green); box-shadow: 0 0 6px rgba(46,204,138,0.5); }
.status-yellow { background: var(–yellow); box-shadow: 0 0 6px rgba(245,200,66,0.4); }
.status-red { background: var(–red); box-shadow: 0 0 6px rgba(240,80,110,0.4); }

.metric-name {
flex: 1;
font-size: 13px;
font-weight: 500;
color: var(–text);
}

.metric-audiences {
display: flex;
gap: 4px;
flex-wrap: wrap;
}

.audience-tag {
font-size: 10px;
font-weight: 600;
padding: 2px 6px;
border-radius: 4px;
letter-spacing: 0.3px;
}
.aud-rvp  { background: rgba(78,140,255,0.15); color: #7aacff; }
.aud-hr   { background: rgba(167,139,250,0.15); color: #c4aeff; }
.aud-rec  { background: rgba(46,204,138,0.15); color: #5dd4a0; }
.aud-bp   { background: rgba(245,200,66,0.15); color: #f5cb5c; }

.metric-expand-icon {
color: var(–text-dim);
font-size: 14px;
transition: transform 0.2s;
flex-shrink: 0;
line-height: 1;
font-family: ‘IBM Plex Mono’, monospace;
}
.metric.expanded .metric-expand-icon { transform: rotate(45deg); }

/* METRIC DETAIL */
.metric-detail {
display: none;
padding: 0 12px 12px;
border-top: 1px solid var(–border);
margin-top: 0;
}
.metric.expanded .metric-detail { display: block; }

.detail-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
margin-top: 10px;
}

.detail-item {}
.detail-item.full { grid-column: 1/-1; }

.detail-key {
font-size: 10px;
font-weight: 700;
letter-spacing: 0.6px;
text-transform: uppercase;
color: var(–text-dim);
margin-bottom: 4px;
}
.detail-val {
font-size: 12px;
color: var(–text-muted);
line-height: 1.5;
}
.detail-val code {
font-family: ‘IBM Plex Mono’, monospace;
font-size: 11px;
background: var(–bg);
padding: 2px 6px;
border-radius: 4px;
color: var(–orange);
display: inline-block;
margin-top: 2px;
}

.status-badge {
display: inline-flex;
align-items: center;
gap: 5px;
font-size: 11px;
font-weight: 600;
padding: 3px 8px;
border-radius: 5px;
}
.status-badge.green { background: var(–green-dim); color: var(–green); }
.status-badge.yellow { background: var(–yellow-dim); color: var(–yellow); }
.status-badge.red { background: var(–red-dim); color: var(–red); }

.action-chip {
display: inline-block;
font-size: 11px;
padding: 3px 8px;
background: var(–blue-dim);
color: var(–blue);
border-radius: 5px;
font-weight: 500;
margin-top: 4px;
}

/* STATS BAR */
.stats-bar {
display: flex;
gap: 24px;
padding: 14px 32px;
border-bottom: 1px solid var(–border);
flex-wrap: wrap;
}
.stat-item { text-align: center; }
.stat-val { font-size: 22px; font-weight: 800; letter-spacing: -1px; }
.stat-label { font-size: 10px; font-weight: 600; color: var(–text-muted); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 1px; }

.progress-bar {
height: 3px;
background: var(–border2);
border-radius: 2px;
margin-top: 6px;
overflow: hidden;
}
.progress-fill {
height: 100%;
border-radius: 2px;
transition: width 0.6s ease;
}

@media (max-width: 700px) {
main, header, .legend, .stats-bar { padding-left: 16px; padding-right: 16px; }
.domains { grid-template-columns: 1fr; }
.detail-grid { grid-template-columns: 1fr; }
}
</style>

</head>

const DOMAINS_META = {
  recruitment: { label: "Рекрутмент", desc: "Найм и привлечение", icon: "🎯", color: "var(--domain-recruitment)" },
  retention:   { label: "Удержание / Отток", desc: "Текучесть и стабильность персонала", icon: "🔄", color: "var(--domain-retention)" },
  workforce:   { label: "Состав и структура", desc: "Численность, структура, ФОТ", icon: "👥", color: "var(--domain-workforce)" },
  performance: { label: "Performance", desc: "Оценки, результативность", icon: "⚡", color: "var(--domain-performance)" },
};

const AUD_LABELS = { rvp: "HRVP", hr: "Рук", rec: "HoR", bp: "HR BP" };
const AUD_CLASS  = { rvp: "aud-rvp", hr: "aud-hr", rec: "aud-rec", bp: "aud-bp" };
const STATUS_TEXTS = { green: "Есть сейчас", yellow: "Частично готово", red: "Нужно строить" };

let activeFilter = "all";

function buildUI() {
  const container = document.getElementById("domainsContainer");
  container.innerHTML = "";

  const grouped = {};
  METRICS.forEach(m => {
    if (!grouped[m.domain]) grouped[m.domain] = {};
    if (!grouped[m.domain][m.category]) grouped[m.domain][m.category] = [];
    grouped[m.domain][m.category].push(m);
  });

  Object.entries(DOMAINS_META).forEach(([domainKey, domainMeta]) => {
    const domainEl = document.createElement("div");
    domainEl.className = "domain";
    domainEl.dataset.domain = domainKey;

    const cats = grouped[domainKey] || {};
    const allMetrics = Object.values(cats).flat();
    const counts = {
      green: allMetrics.filter(m=>m.status==="green").length,
      yellow: allMetrics.filter(m=>m.status==="yellow").length,
      red: allMetrics.filter(m=>m.status==="red").length,
    };

    domainEl.innerHTML = `
      <div class="domain-header" onclick="toggleDomain(this)">
        <div class="domain-icon" style="background:${domainMeta.color}22; color:${domainMeta.color}">${domainMeta.icon}</div>
        <div class="domain-title">
          <h2 style="color:${domainMeta.color}">${domainMeta.label}</h2>
          <p>${domainMeta.desc} · ${allMetrics.length} метрик · <span style="color:var(--green)">${counts.green}✓</span> <span style="color:var(--yellow)">${counts.yellow}~</span> <span style="color:var(--red)">${counts.red}✗</span></p>
        </div>
        <div class="domain-toggle">▾</div>
      </div>
      <div class="domain-body" id="body-${domainKey}"></div>
    `;

    const body = domainEl.querySelector(`#body-${domainKey}`);

    Object.entries(cats).forEach(([catName, metrics]) => {
      const catEl = document.createElement("div");
      catEl.className = "category";

      const metricsHTML = metrics.map((m, i) => {
        const uid = `${domainKey}-${catName}-${i}`.replace(/\s+/g,"_");
        const audTags = m.audiences.map(a =>
          `<span class="audience-tag ${AUD_CLASS[a]}">${AUD_LABELS[a]}</span>`
        ).join("");

        return `
          <div class="metric" data-audiences="${m.audiences.join(",")}" data-uid="${uid}">
            <div class="metric-row" onclick="toggleMetric('${uid}')">
              <div class="metric-status status-${m.status}"></div>
              <div class="metric-name">${m.name}</div>
              <div class="metric-audiences">${audTags}</div>
              <div class="metric-expand-icon">+</div>
            </div>
            <div class="metric-detail" id="detail-${uid}">
              <div class="detail-grid">
                <div class="detail-item">
                  <div class="detail-key">Доступность данных</div>
                  <div class="detail-val">
                    <span class="status-badge ${m.status}">${STATUS_TEXTS[m.status]}</span>
                  </div>
                </div>
                <div class="detail-item">
                  <div class="detail-key">Источник</div>
                  <div class="detail-val">${m.dataSource}</div>
                </div>
                <div class="detail-item full">
                  <div class="detail-key">Формула / логика</div>
                  <div class="detail-val"><code>${m.formula}</code></div>
                </div>
                <div class="detail-item full">
                  <div class="detail-key">Статус данных</div>
                  <div class="detail-val">${m.dataStatus}</div>
                </div>
                <div class="detail-item full">
                  <div class="detail-key">Следующий шаг</div>
                  <div class="detail-val"><span class="action-chip">→ ${m.action}</span></div>
                </div>
              </div>
            </div>
          </div>`;
      }).join("");

      catEl.innerHTML = `<div class="category-name">${catName}</div>${metricsHTML}`;
      body.appendChild(catEl);
    });

    container.appendChild(domainEl);
  });

  updateStats();
}

function toggleDomain(headerEl) {
  const domain = headerEl.closest(".domain");
  domain.classList.toggle("collapsed");
}

function toggleMetric(uid) {
  const el = document.querySelector(`[data-uid="${uid}"]`);
  el.classList.toggle("expanded");
}

function applyFilter(filter) {
  activeFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.filter === filter);
  });
  document.querySelectorAll(".metric").forEach(m => {
    if (filter === "all") {
      m.classList.remove("hidden-by-filter");
    } else {
      const auds = m.dataset.audiences.split(",");
      m.classList.toggle("hidden-by-filter", !auds.includes(filter));
    }
  });
  updateStats();
}

function updateStats() {
  const visible = [...document.querySelectorAll(".metric:not(.hidden-by-filter)")];
  const total = visible.length;
  const g = visible.filter(m => m.querySelector(".metric-status").classList.contains("status-green")).length;
  const y = visible.filter(m => m.querySelector(".metric-status").classList.contains("status-yellow")).length;
  const r = visible.filter(m => m.querySelector(".metric-status").classList.contains("status-red")).length;

  document.getElementById("statTotal").textContent = total;
  document.getElementById("statGreen").textContent = g;
  document.getElementById("statYellow").textContent = y;
  document.getElementById("statRed").textContent = r;

  const pct = n => total ? Math.round(n/total*100) + "%" : "0%";
  document.getElementById("pgGreen").style.width = pct(g);
  document.getElementById("pgYellow").style.width = pct(y);
  document.getElementById("pgRed").style.width = pct(r);
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => applyFilter(btn.dataset.filter));
});

buildUI();
</script>
